<!DOCTYPE html>
{% load static %}
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Rankings</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tournament_page.css' %}">

</head>

<body>
    {% include "navbar_template.html" %}
    <div class="container-fluid py-4">
        <!-- 1️⃣ DEPORTE -->
        <div class="row league-row">
            <div class="col-12 dashboard-item">
                <div class="esports-card">
                    <h5 class="card-title">Deporte</h5>
                    <div class="row g-3 align-items-end">
                        <div class="col-md-12 col-12">
                            <label class="score-label mb-2">Deporte</label>
                            <select class="form-select esports-select" id="sportSelect" name="deporte">
                                <option value="">Seleccionar deporte</option>
                                {% for dep in deportes %}
                                <option value="{{dep.team_sport_name}}">{{dep.team_sport_name}}</option>
                                {% endfor %}
                                {% for dep in deportes_jug %}
                                <option value="{{dep.player_trn_sport_name}}">{{dep.player_trn_sport_name}}</option>
                                {% endfor %}
                                <option value="Clubes">Clubes</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row league-row">
            <div class="col-12 dashboard-item">
                <div class="esports-card">
                    <h5 class="card-title">Deporte</h5>
                    <div class="row g-3 align-items-end">
                        <div class="col-md-12 col-12">
                            <label class="score-label mb-2">Año</label>
                            <select class="form-select esports-select" name="valoryear" id="yearSelect">
                                <option selected>Seleccionar año</option>
                                {% for year in years %}
                                <option value="{{ year }}">{{ year }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-12 col-12">
                            <button class="esports-btn justify-content-center" hx-get="{% url 'consultar_por_torneo' %}"
                                hx-target="#searchResults" hx-include="#sportSelect, #yearSelect">
                                <i class="bi bi-people"></i>Consultar rankings
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="searchResults">
            <!--Resultados de la búsqueda-->
        </div>


    </div>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>

</html>
