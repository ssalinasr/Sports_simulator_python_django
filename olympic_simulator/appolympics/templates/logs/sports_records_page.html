<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Records</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
     <link rel="stylesheet" href="{% static 'css/sports_records.css' %}">
	
<style>

</style>
	
</head>

<body>

{% include "navbar_template.html" %}
<div class="container-fluid py-4">

    <!-- 🔵 FILA 1 — OPCIONES -->
    <div class="row league-row">
        <div class="col-12 dashboard-item">
            <div class="esports-card">

                <h5 class="card-title">Opciones</h5>

                <!-- Selectores -->
                <div class="row g-3 mb-4">

                    <div class="col-md-6 col-12">
                        <label class="score-label mb-2">Categoría</label>
                        <select class="form-select esports-select"
                        name="categoria"
                        id="categoriasSelect"
                        hx-get="{% url 'cargar_pruebas' clase %}"
                        hx-target="#pruebasSelect"
                        hx-trigger="change">
                            <option value="">Seleccionar categoría</option>
                            {% for cat in categorias %}
                            <option value="{{ cat.team_sport_name }}">{{ cat.team_sport_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6 col-12">
                        <label class="score-label mb-2">Prueba</label>
                        <select class="form-select esports-select" id="pruebasSelect" name="prueba">
                        </select>
                    </div>
                </div>

                <!-- Botones -->
                <div class="row align-items-center">
                    <div class="col-md-12 col-12 mb-3 mb-md-0 text-center text-md-start">
                        <button class="esports-btn"
                        hx-get="{% url 'consultar_records' clase %}"
                        hx-target="#resultsSimulation"
                        hx-include="#pruebasSelect, #categoriasSelect">
                            <i class="bi bi-play-fill"></i>
                            Consultar Records
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>


    <!-- 🟣 FILA 2 — SIMULACION -->
    <div class="row league-row">
        <div class="col-12 dashboard-item">
            <div class="esports-card">

                <h5 class="card-title">Registro de Record</h5>

                <div class="table-responsive" id="resultsSimulation">
                </div>

            </div>
        </div>
    </div>

</div>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const getCellValue = (tr, idx) => {
        return tr.children[idx].innerText.trim();
    };

    const comparer = (idx, asc, type) => (a, b) => {
        let v1 = getCellValue(asc ? a : b, idx);
        let v2 = getCellValue(asc ? a : b, idx);

        if (type === "number") {
            return parseFloat(v1) - parseFloat(v2);
        }
        return v1.localeCompare(v2);
    };

    document.querySelectorAll(".sortable").forEach((th, index) => {

        let asc = true;

        th.addEventListener("click", () => {

            const table = th.closest("table");
            const tbody = table.querySelector("tbody");
            const rows = Array.from(tbody.querySelectorAll("tr"));
            const type = th.getAttribute("data-type");

            // Quitar indicadores anteriores
            document.querySelectorAll(".sortable").forEach(header => {
                header.innerHTML = header.innerText.replace(/ ▲| ▼/g, "");
            });

            asc = !asc;

            rows.sort(comparer(index, asc, type));

            rows.forEach(tr => tbody.appendChild(tr));

            // Indicador visual
            th.innerHTML += asc ? " ▲" : " ▼";
        });

    });

});
</script>
</body>
</html>
