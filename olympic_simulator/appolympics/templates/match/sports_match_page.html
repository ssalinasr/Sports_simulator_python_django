<!DOCTYPE html>
<html lang="es">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Partido</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/match_page.css' %}">

</head>
<body>
{% include "navbar_template.html" %}
    <div class="container-fluid mt-5 px-4">

    <!-- ===== FILA 1 : MARCADOR ===== -->
    <div class="row mb-4 dashboard-item">
        <div class="col-12">
            <div class="esports-card">
                <h5 class="card-title">Marcador</h5>

                <div class="row align-items-center text-center">

                    <!-- Equipo 1 -->
                    <div class="col-md-4" id="localTeam">

                    </div>

                    <!-- Marcadores -->
					<div class="col-md-4" id="matchResult">



					</div>

                    <!-- Equipo 2 -->
                    <div class="col-md-4" id="awayTeam">

                    </div>

                </div>
                <!-- Botón Realizar -->
                <div class="text-center mt-3">
                    <button class="btn-do-match"
                    hx-get="{% url 'generar_partido' clase %}"
                    hx-target="#matchResult"
                    hx-include="#equipolocal, #equipovisitante, #deporteSelect, #extraSelect, #dobleRondaSelect">
                        <i class="bi bi-arrow-counterclockwise"></i>
                        Realizar Partido
                    </button>
                </div>
            </div>

        </div>
    </div>

	<!-- ===== FILA 2 : EQUIPOS ===== -->
	<div class="row mb-4 dashboard-item">
		<div class="col-12">
			<div class="esports-card">
				<h5 class="card-title">Equipos</h5>

				<!-- Selectores -->
				<div class="row g-3 mb-4">
					<div class="col-md-6">
						<label class="hud-label">Agrupación</label>
						<select 
                        class="form-select hud-select"
                        name = "agrupacion"
                        id ="agrupacionSelect"
                        hx-get="{% url 'cargar_equipos' clase %}"
                        hx-target="#equipoSelect"
                        hx-trigger="change">
						<option value="">Seleccionar agrupación</option>
                            {% for agr in agrupaciones %}
                                {% if clase == 1 or clase == 5 %}
                                <option value="{{ agr.team_region_id }}">{{ agr.team_region_name }}</option>
                                {% endif %}
                                {% if clase == 2 %}
                                <option value="{{ agr.team_sport_id }}">{{ agr.team_sport_name }}</option>
                                {% endif %}
                                {% if clase == 3 %}
                                <option value="{{ agr.club_league_id }}">{{ agr.club_league_name }}</option>
                                {% endif %}
                                {% if clase == 4 %}
                                <option value="{{ agr.ol_country_id }}">{{ agr.ol_country_name }}</option>
                                {% endif %}
                            {% endfor %}
						</select>
					</div>

					<div class="col-md-6">
						<label class="hud-label">Equipo</label>
						<select class="form-select hud-select" id="equipoSelect" name="equipo_id">

						</select>
					</div>
				</div>

				<!-- Botones centrados -->
				<div class="d-flex justify-content-center gap-4">
					<button 
                    class="btn esports-btn" 
                    style="width: 220px;"
                    name="orientacion"
                    value="local"
                    hx-get="{% url 'mostrar_equipo' clase %}"
                    hx-target="#localTeam"
                    hx-include="#equipoSelect">
						Insertar Equipo 1
					</button>

					<button 
                    class="btn esports-btn" 
                    style="width: 220px;"
                    name="orientacion"
                    value="visitante"
                    hx-get="{% url 'mostrar_equipo' clase %}"
                    hx-target="#awayTeam"
                    hx-include="#equipoSelect">
						Insertar Equipo 2
					</button>
				</div>

			</div>
		</div>
	</div>


    <!-- ===== FILA 3 : OPCIONES ===== -->
    <div class="row mb-5 dashboard-item">
        <div class="col-12">
            <div class="esports-card">
                <h5 class="card-title">Opciones</h5>

                <!-- Selector -->
                <div class="mb-4">
                    <label class="score-label mb-2">Deporte</label>
                    <select class="form-select esports-select" name="deporte" id="deporteSelect">
                        <option value="">Seleccionar Deporte</option>
                            {% for dep in deportes %}
                                {% if clase == 1 or clase == 5 %}
                                <option value="{{ dep.team_sport_name }}">{{ dep.team_sport_name }}</option>
                                {% endif %}
                                {% if clase == 2 %}
                                <option value="{{ dep.player_trn_sport_name }}">{{ dep.player_trn_sport_name }}</option>
                                {% endif %}
                                {% if clase == 3 %}
                                <option value="{{ dep }}">{{ dep }}</option>
                                {% endif %}
                                {% if clase == 4 %}
                                <option value="{{ dep.player_trn_sport_name }}">{{ dep.player_trn_sport_name }}</option>
                                {% endif %}
                            {% endfor %}
                    </select>
                </div>
                {% if clase == 1 or clase == 3 or clase == 5 %}
                <div class="d-flex flex-wrap justify-content-center gap-3">
                    <div class="form-check form-switch hud-check w-100">
                        <input class="form-check-input" type="checkbox" id="extraSelect" name="tiempoextra">
                        <label class="form-check-label" for="extraSelect">
                            Tiempos Extra
                        </label>
                    </div>

                    <div class="form-check form-switch hud-check w-100">
                        <input class="form-check-input" type="checkbox" id="dobleRondaSelect" name="dobleronda">
                        <label class="form-check-label" for="dobleRondaSelect">
                            Ida y vuelta
                        </label>
                    </div>
                </div>
                {% endif %}
				    <!-- Botón Reiniciar -->
					<div class="text-center mt-3">
                        <form method="POST" action="{% url 'pagina_partido_individual' clase %}">
                        {% csrf_token %}
						<button class="btn-reset-match">
							<i class="bi bi-arrow-counterclockwise"></i>
							Reiniciar Partido
						</button>
                        </form>
					</div>
            </div>
        </div>
    </div>

</div>


<script>
function updateScore(elementId, newValue) {
    const el = document.getElementById(elementId);
    if (!el) return;

    el.textContent = newValue;

    el.classList.remove('score-animate');
    void el.offsetWidth; // reinicia animación
    el.classList.add('score-animate');
}

const principal = document.getElementById("deporteSelect");
const secundario1 = document.getElementById("agrupacionSelect");
const secundario2 = document.getElementById("equipoSelect");

principal.addEventListener("change", function() {
    if (principal.value !== "ninguno") {
        secundario1.disabled = false;
        secundario2.disabled = false;
    } else {
        secundario1.disabled = true;
        secundario2.disabled = true;
    }
});
principal.dispatchEvent(new Event("change"));
</script>


<script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>
</html>
