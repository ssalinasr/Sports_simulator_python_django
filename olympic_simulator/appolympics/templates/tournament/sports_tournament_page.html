<!DOCTYPE html>
<html lang="es">
{% load static %}

<head>
    <meta charset="UTF-8">
    <title>Torneo</title>

    <!-- Bootstrap -->

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tournament_page.css' %}">

<body>
    {% include "navbar_template.html" %}
    <div class="container mt-4">
        <div class="row g-4">

            <!-- ================= EQUIPOS ================= -->
            <div class="col-12 dashboard-item">
                <div class="esports-card">
                    <div class="card-title">
                        <i class="bi bi-people-fill"></i> Equipos
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="score-label">Deporte</label>
                            <select class="form-select esports-select" name="deporte" id="deporteSelect">
                                <option value="">Seleccionar Deporte</option>

                                {% if clase == 1 or clase == 5 %}
                                <option value="{{ dep.team_sport_name }}">{{ dep.team_sport_name }}</option>
                                {% endif %}
                                {% if clase == 2 %}
                                <option value="{{ dep.player_trn_sport_name }}">{{ dep.player_trn_sport_name }}</option>
                                {% endif %}
                                {% if clase == 3 %}
                                <option value="{{ dep }}">{{ dep }}</option>
                                {% endif %}
                                {% if clase == 4 %}
                                <option value="{{ dep.player_trn_sport_name }}">{{ dep.player_trn_sport_name }}</option>
                                {% endif %}
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="score-label">Agrupación</label>
                            <select class="form-select esports-select" name="agrupacion" id="agrupacionSelect"
                                hx-get="{% url 'cargar_equipos' clase %}" hx-target="#equipoSelect" hx-trigger="change">
                                <option value="">Seleccionar agrupación</option>
                                {% for agr in agrupaciones %}
                                {% if clase == 1 or clase == 5 %}
                                <option value="{{ agr.team_region_id }}">{{ agr.team_region_name }}</option>
                                {% endif %}
                                {% if clase == 2 %}
                                <option value="{{ agr.team_sport_id }}">{{ agr.team_sport_name }}</option>
                                {% endif %}
                                {% if clase == 3 %}
                                <option value="{{ agr.club_league_id }}">{{ agr.club_league_name }}</option>
                                {% endif %}
                                {% if clase == 4 %}
                                <option value="{{ agr.ol_country_id }}">{{ agr.ol_country_name }}</option>
                                {% endif %}
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="score-label">Equipos</label>
                            <select class="form-select esports-select" id="equipoSelect" name="equipo_id"
                                hx-get="{% url 'insertar_equipo' clase %}" hx-target="#teamTags" hx-swap="beforeend"
                                hx-trigger="change">
                            </select>
                        </div>

                    </div>

                    <!--<input id="teamTags" 
                       class="form-control esports-input"
                       placeholder="Los equipos se ubican aquí..." readonly>-->

                    <div id="teamTags" class="tag-container mt-3"></div>

                    <div class="text-center mt-3">
                        <button class="esports-btn" hx-get="{% url 'generar_torneo' clase %}"
                            hx-target="#resultsTournament"
                            hx-include="#teamTags, #deporteSelect, #selectLegs, #selectThird">
                            <i class="bi bi-arrow-counterclockwise"></i>
                            Generar Torneo
                        </button>
                    </div>

                </div>
            </div>
            <!-- ================= TABLA ================= -->
            <div class="col-12 dashboard-item" id="resultsTournament">

            </div>


            <!-- ================= OPCIONES ================= -->
            <div class="col-12 dashboard-item">
                <div class="esports-card">
                    <div class="card-title">
                        <i class="bi bi-sliders"></i> Opciones
                    </div>

                    <div class="d-flex flex-column gap-2 align-items-center">
                        <div class="form-check form-switch hud-check w-100">
                            <input class="form-check-input" type="checkbox" id="selectLegs" name="idayvuelta">
                            <label class="form-check-label">
                                Con ronda de Ida y Vuelta

                    </div>

                    <div class="d-flex flex-column gap-2 align-items-center">
                        <div class="form-check form-switch hud-check w-100">
                            <input class="form-check-input" type="checkbox" id="selectThird" name="tercerlugar">
                            <label class="form-check-label">
                                Hay tercer lugar
                            </label>

                        </div>
                    </div>

                </div>
            </div>


            <!-- ================= BOTONES ================= -->
            <div class="col-12 dashboard-item">
                <div class="esports-card text-center">
                    <div class="card-title">
                        <i class="bi bi-power"></i> Botones
                    </div>

                    <div class="d-flex justify-content-center gap-3 flex-wrap">
                        <form method="POST" action="{% url 'pagina_partidos_torneo' clase %}">
                            {% csrf_token %}
                            <button class="btn-reset-match">
                                <i class="bi bi-arrow-counterclockwise"></i>
                                Reiniciar Liga
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <script>
        function buildBracket() {

            const wrapper = document.querySelector(".bracket-wrapper")
            const svg = document.getElementById("bracket-lines")

            if (!wrapper || !svg) return

            adjustRoundSpacing()

            requestAnimationFrame(() => {

                drawConnections(wrapper, svg)

            })

        }

        function adjustRoundSpacing() {

            const rounds = document.querySelectorAll(".bracket-round")
            if (rounds.length === 0) return

            const match = document.querySelector(".bracket-match")
            if (!match) return

            const matchHeight = match.offsetHeight

            const firstRoundMatches = rounds[0].querySelector(".round-matches")
            const style = window.getComputedStyle(firstRoundMatches)
            const baseGap = parseFloat(style.gap)

            const unit = matchHeight + baseGap

            rounds.forEach((round, i) => {

                const container = round.querySelector(".round-matches")
                if (!container) return

                if (i === 0) {
                    container.style.gap = baseGap + "px"
                    return
                }

                const gap = unit * Math.pow(2, i) - matchHeight
                const marginTop = unit * Math.pow(2, i - 1) - 50

                container.style.gap = gap + "px"
                round.style.marginTop = marginTop + "px"

            })

        }
        function drawConnections(wrapper, svg) {

            svg.innerHTML = ""

            const wrapperRect = wrapper.getBoundingClientRect()

            svg.setAttribute("width", wrapperRect.width)
            svg.setAttribute("height", wrapperRect.height)

            const rounds = wrapper.querySelectorAll(".bracket-round")

            for (let r = 0; r < rounds.length - 1; r++) {

                const matches = rounds[r].querySelectorAll(".bracket-match")
                const nextMatches = rounds[r + 1].querySelectorAll(".bracket-match")

                for (let i = 0; i < matches.length; i += 2) {

                    const m1 = matches[i]
                    const m2 = matches[i + 1]
                    const target = nextMatches[Math.floor(i / 2)]

                    if (!m1 || !m2 || !target) continue

                    const rect1 = m1.getBoundingClientRect()
                    const rect2 = m2.getBoundingClientRect()
                    const rectT = target.getBoundingClientRect()

                    /* punto inicial centro derecha match 1 */
                    const x1 = rect1.right - wrapperRect.left + 40
                    const y1 = rect1.top + rect1.height / 2 - wrapperRect.top + 45

                    /* punto inicial centro derecha match 2 */
                    const x2 = rect2.right - wrapperRect.left + 40
                    const y2 = rect2.top + rect2.height / 2 - wrapperRect.top + 45

                    /* punto destino centro izquierda */
                    const xt = rectT.left - wrapperRect.left + 40
                    const yt = rectT.top + rectT.height / 2 - wrapperRect.top + 40

                    const midX = x1 + 40

                    /* match 1 horizontal */
                    drawLine(svg, x1, y1, midX, y1)

                    /* match 2 horizontal */
                    drawLine(svg, x2, y2, midX, y2)

                    /* unión vertical */
                    drawLine(svg, midX, y1, midX, y2)

                    /* salida hacia siguiente ronda */
                    drawLine(svg, midX, yt, xt, yt)
                }
            }
        }

        function drawLine(svg, x1, y1, x2, y2) {

            const line = document.createElementNS("http://www.w3.org/2000/svg", "line")

            line.setAttribute("x1", x1)
            line.setAttribute("y1", y1)
            line.setAttribute("x2", x2)
            line.setAttribute("y2", y2)

            line.setAttribute("stroke", "#00b7ff")
            line.setAttribute("stroke-width", "2")

            svg.appendChild(line)

        }
        window.addEventListener("load", buildBracket)
        document.body.addEventListener("htmx:afterSwap", function () {
            setTimeout(buildBracket, 120)
        })

        window.addEventListener("resize", buildBracket)


        function eliminarEquipo(elemento) {
    const teamId = elemento.dataset.id; // ya es string

    fetch('delete_team/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken'),
        },
        body: JSON.stringify({ team_id: teamId })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === 'ok') {
            elemento.remove();
        }

        // eliminar input hidden asociado
            const input = document.getElementById(`item-${teamId}`);
            if (input) {
                input.remove();
            }
    });
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie) {
        document.cookie.split(';').forEach(cookie => {
            cookie = cookie.trim();
            if (cookie.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            }
        });
    }
    return cookieValue;
}
    </script>



</body>

</html>
