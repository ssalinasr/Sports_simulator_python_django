<!DOCTYPE html>
<html lang="es">
{% load static %}

<head>
    <meta charset="UTF-8">
    <title>Simulacion Completa</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/complete_simulation_page.css' %}">

</head>

<body>
    {% include "navbar_template.html" %}
    <div class="container-fluid py-4">

        <!-- ========================= -->
        <!-- PRIMERA FILA - OPCIONES -->
        <!-- ========================= -->
        <div class="row league-row">
            <div class="col-12 dashboard-item">
                <div class="esports-card">

                    <div class="card-title">Opciones</div>

                    <div class="row g-4 justify-content-center">
                        <!-- Selector Deporte -->
                        <div class="col-md-6">
                            <label class="score-label">Deporte</label>
                            <select class="form-select esports-select" name="deporte" id="deporteSelect">
                                <option value="">Seleccionar Deporte</option>
                                {% for dep in deportes %}
                                {% if clase == 1 or clase == 5 %}
                                <option value="{{ dep.team_sport_name }}">{{ dep.team_sport_name }}</option>
                                {% endif %}
                                {% if clase == 2 %}
                                <option value="{{ dep.player_trn_sport_name }}">{{ dep.player_trn_sport_name }}</option>
                                {% endif %}
                                {% if clase == 3 %}
                                <option value="{{ dep }}">{{ dep }}</option>
                                {% endif %}
                                {% if clase == 4 %}
                                <option value="{{ dep.player_trn_sport_name }}">{{ dep.player_trn_sport_name }}</option>
                                {% endif %}
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Selector Año -->
                        <div class="col-md-6">
                            <label class="score-label">Año</label>
                            <select class="form-select esports-select" name="valoryear" id="tournamentYear">
                                <option selected>Seleccionar año</option>
                                {% for year in years %}
                                <option value="{{ year }}">{{ year }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Botón -->
                        <div class="col-12 text-center mt-3">
                            {% if clase != 3 %}
                            <button class="esports-btn justify-content-center"
                                hx-get="{% url 'generar_simulacion_completa' clase %}" hx-target="#resultsTournament"
                                hx-include="#deporteSelect, #tournamentYear, #selectSave">>
                                Generar competencia
                            </button>
                            {% else %}
                            <button class="esports-btn justify-content-center"
                                hx-get="{% url 'generar_simulacion_completa_clubes' clase %}" hx-target="#resultsTournament"
                                hx-include="#deporteSelect, #tournamentYear, #selectSave">>
                                Generar competencia
                            </button>
                            {% endif %}
                        </div>

                    </div>

                </div>
            </div>
        </div>

        <!-- ================= OPCIONES ================= -->
        <div class="col-12 dashboard-item">
            <div class="esports-card">
                <div class="card-title">
                    <i class="bi bi-sliders"></i> Opciones
                </div>
                <div class="d-flex flex-column gap-2 align-items-center">

                    <div class="form-check form-switch hud-check w-100">
                        <input class="form-check-input" type="checkbox" id="selectSave" name="registrarres">
                        <label class="form-check-label">
                            Guardar resultados en BD
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========================= -->
        <!-- SEGUNDA FILA - MENSAJE -->
        <!-- ========================= -->
        <div class="row league-row">
            <div class="col-12 dashboard-item" id="resultsTournament">

            </div>
        </div>
    </div>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>

</html>
